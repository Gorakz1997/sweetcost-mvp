<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SweetCost MVP</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Custom Neo-Brutalist Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="min-h-screen p-4 md:p-8">

    <!-- 1. Navbar Superior -->
    <nav class="brutal-card mb-8 p-4 flex flex-col md:flex-row justify-between items-center gap-4 bg-white">
        <div class="text-3xl font-black tracking-tighter">
            <span class="text-[var(--on-background)]">Sweet</span><span class="text-[var(--primary)]">Cost</span>
        </div>

        <div class="flex-1 max-w-xl w-full">
            <input type="text" placeholder="Buscar recetas..." class="brutal-input w-full brutal-shadow">
        </div>

        <div class="flex gap-4 font-bold text-lg">
            <button id="btn-tab-ingredientes"
                class="px-6 py-3 brutal-border bg-white brutal-shadow active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all">Ingredientes</button>
            <button id="btn-tab-recetas"
                class="px-6 py-3 brutal-border bg-[var(--secondary-container)] brutal-shadow active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all">Recetas</button>
        </div>
    </nav>

    <!-- 2. Contenedor Principal (Cambio de Pestañas) -->
    <main id="main-container" class="w-full">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

            <!-- Columna Izquierda (Fija - COMÚN A AMBAS PESTAÑAS) -->
            <aside class="lg:col-span-4">
                <div class="brutal-card p-6 sticky top-8 bg-white">
                    <h2 class="text-2xl font-black mb-6 uppercase border-b-4 border-[var(--border-color)] pb-2">Carga
                        Rápida</h2>

                    <form id="form-carga-rapida" class="flex flex-col gap-5">
                        <div>
                            <label class="block font-bold mb-2 text-lg">Nombre del Ingrediente</label>
                            <input type="text" id="input-nombre-rapido" placeholder="Ej. Harina 0000"
                                class="brutal-input w-full brutal-shadow" required>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block font-bold mb-2 text-lg">Precio ($)</label>
                                <input type="number" id="input-precio-rapido" step="0.01" placeholder="0.00"
                                    inputmode="decimal" class="brutal-input w-full brutal-shadow" required>
                            </div>
                            <div>
                                <label class="block font-bold mb-2 text-lg">Unidad</label>
                                <select id="select-unidad-rapida"
                                    class="brutal-input w-full brutal-shadow appearance-none bg-white cursor-pointer">
                                    <option value="kg">kg</option>
                                    <option value="gramos">gramos</option>
                                    <option value="litro">litro</option>
                                    <option value="ml">ml</option>
                                    <option value="unidad">unidad</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" id="btn-guardar-rapido"
                            class="brutal-btn py-3 mt-4 text-xl">Guardar</button>
                    </form>
                </div>
            </aside>

            <!-- Columna Derecha (Contenido de las Pestañas) -->
            <section class="lg:col-span-8">

                <!-- ================= PESTAÑA: RECETAS ================= -->
                <div id="seccion-recetas">

                    <!-- VISTA: Lista de Recetas -->
                    <div id="vista-lista-recetas">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                            <h1 class="text-4xl font-black uppercase tracking-tight">Mis Recetas</h1>
                            <button id="btn-nueva-receta" class="brutal-btn px-6 py-3 text-lg flex items-center gap-2">
                                <span class="text-2xl font-black leading-none">+</span> Nueva Receta
                            </button>
                        </div>

                        <!-- Cuadrícula (Grid) de Recetas Mock -->
                        <div id="grid-recetas" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                            <!-- Las recetas se renderizarán dinámicamente aquí -->
                        </div>
                    </div>

                    <!-- VISTA: Formulario de Nueva Receta (Oculto) -->
                    <div id="vista-form-receta" class="hidden brutal-card p-6 bg-white">
                        <div
                            class="flex justify-between items-center border-b-4 border-[var(--border-color)] pb-2 mb-6">
                            <h2 class="text-3xl font-black uppercase">Nueva Receta</h2>
                            <button id="btn-volver-recetas"
                                class="brutal-btn px-4 py-2.5 min-h-[44px] text-sm bg-white active:bg-gray-200 transition-colors">Volver</button>
                        </div>

                        <div class="flex flex-col gap-6">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <label class="block font-bold mb-2">Nombre de la Receta</label>
                                    <input type="text" id="receta-nombre" class="brutal-input w-full brutal-shadow"
                                        placeholder="Ej. Torta de Vainilla">
                                </div>
                                <div>
                                    <label class="block font-bold mb-2">Imagen de la Receta</label>
                                    <div class="relative w-full h-14 brutal-card bg-gray-50 flex items-center justify-center cursor-pointer active:bg-gray-100 transition-colors" id="btn-select-imagen">
                                        <!-- Input oculto para archivo -->
                                        <input type="file" id="receta-imagen-file" accept="image/*" class="hidden">
                                        <!-- Estado vacío (el +) -->
                                        <div id="preview-placeholder" class="flex items-center gap-2 text-center p-2">
                                            <span class="text-2xl font-black">+</span>
                                            <span class="text-xs font-bold uppercase tracking-wider">Subir Foto</span>
                                        </div>
                                        <!-- Vista previa (inicialmente oculta) -->
                                        <img id="preview-imagen-img" class="absolute inset-0 w-full h-full object-cover hidden">
                                        <!-- Botón para quitar (inicialmente oculto) -->
                                        <button id="btn-clear-imagen" type="button" class="absolute -top-3 -right-3 brutal-border w-11 h-11 flex justify-center items-center text-sm font-black bg-[var(--error)] text-white brutal-shadow active:translate-y-0.5 active:translate-x-0.5 active:shadow-none transition-all hidden">
                                            X
                                        </button>
                                    </div>
                                </div>
                                <div>
                                    <label class="block font-bold mb-2">Margen (%)</label>
                                    <select id="receta-margen" class="brutal-input w-full brutal-shadow bg-white appearance-none cursor-pointer">
                                        <option value="0">0%</option>
                                        <option value="5">5%</option>
                                        <option value="10">10%</option>
                                        <option value="15">15%</option>
                                        <option value="20">20%</option>
                                        <option value="25">25%</option>
                                        <option value="30">30%</option>
                                        <option value="35">35%</option>
                                        <option value="40">40%</option>
                                        <option value="45">45%</option>
                                        <option value="50">50%</option>
                                        <option value="55">55%</option>
                                        <option value="60">60%</option>
                                        <option value="65">65%</option>
                                        <option value="70">70%</option>
                                        <option value="75">75%</option>
                                        <option value="80">80%</option>
                                        <option value="85">85%</option>
                                        <option value="90">90%</option>
                                        <option value="95">95%</option>
                                        <option value="100" selected>100%</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Selector para Agregar Ingrediente -->
                            <div
                                class="p-4 bg-[var(--surface-container)] brutal-border flex flex-col md:flex-row gap-4 items-end">
                                <div class="flex-1">
                                    <label class="block font-bold mb-2">Ingrediente</label>
                                    <div class="flex gap-2">
                                        <select id="receta-select-ingrediente"
                                            class="brutal-input w-full brutal-shadow bg-white cursor-pointer">
                                            <!-- Se poblará dinámicamente -->
                                        </select>
                                        <button id="btn-open-modal-ingrediente"
                                            class="brutal-btn px-4 min-h-[44px] font-black text-xl active:translate-y-0.5 active:shadow-none transition-all">+</button>
                                    </div>
                                </div>
                                <div class="w-32">
                                    <label class="block font-bold mb-2">Cantidad</label>
                                    <input type="number" id="receta-cantidad-ingrediente"
                                        inputmode="decimal" class="brutal-input w-full brutal-shadow" step="0.01" placeholder="0">
                                </div>
                                <div class="w-32">
                                    <label class="block font-bold mb-2">Unidad</label>
                                    <select id="receta-unidad-ingrediente"
                                        class="brutal-input w-full brutal-shadow bg-white appearance-none cursor-pointer">
                                        <option value="kg">kg</option>
                                        <option value="gramos">gramos</option>
                                        <option value="litro">litro</option>
                                        <option value="ml">ml</option>
                                        <option value="unidad">unidad</option>
                                    </select>
                                </div>
                                <button id="btn-add-ingrediente-receta"
                                    class="brutal-btn px-6 py-[0.8rem]">Añadir</button>
                            </div>

                            <!-- Tabla de Ingredientes de la Receta -->
                            <div class="overflow-x-auto">
                                <table class="w-full text-left brutal-border mt-2">
                                    <thead
                                        class="bg-[var(--secondary-container)] border-b-4 border-[var(--border-color)]">
                                        <tr>
                                            <th class="p-2 border-r-4 border-[var(--border-color)]">Ingrediente</th>
                                            <th class="p-2 border-r-4 border-[var(--border-color)]">Cantidad</th>
                                            <th class="p-2 border-r-4 border-[var(--border-color)]">Subtotal</th>
                                            <th class="p-2 text-center">X</th>
                                        </tr>
                                    </thead>
                                    <tbody id="receta-tabla-body">
                                        <!-- Filas dinámicas -->
                                    </tbody>
                                </table>
                            </div>

                            <!-- Totales -->
                            <div
                                class="flex flex-col items-end mt-4 p-4 border-4 border-[var(--border-color)] bg-[var(--surface-container-low)] brutal-shadow">
                                <div class="text-xl font-bold mb-2">Costo Total: $<span
                                        id="receta-costo-total">0.00</span></div>
                                <div
                                    class="text-3xl font-black text-[var(--primary)] border-t-4 border-dashed border-[var(--border-color)] pt-2 mt-2">
                                    Precio Sugerido: $<span id="receta-precio-sugerido">0.00</span></div>
                            </div>

                            <button id="btn-guardar-receta" class="brutal-btn py-4 text-xl mt-4">Guardar Receta</button>
                        </div>
                    </div>
                </div>
                <!-- ================= FIN PESTAÑA: RECETAS ================= -->

                <!-- ================= PESTAÑA: INGREDIENTES ================= -->
                <div id="seccion-ingredientes" class="hidden brutal-card p-6 bg-white w-full">
                    <h2 class="text-3xl font-black uppercase border-b-4 border-[var(--border-color)] pb-2 mb-6">
                        Listado de Ingredientes</h2>
                    <div class="overflow-x-auto">
                        <div id="empty-ingredientes"
                            class="col-span-full p-6 text-center font-bold text-gray-500 bg-white brutal-border hidden">
                            No tienes ingredientes creados todavía.</div>
                        <div id="grid-ingredientes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            <!-- JS inyectará las tarjetas aquí -->
                        </div>
                    </div>
                </div>
                <!-- ================= FIN PESTAÑA: INGREDIENTES ================= -->

            </section>
        </div>
    </main>

    <!-- 3. Ventana Modal Oculta (Ingrediente Rápido) -->
    <div id="modal-ingrediente"
        class="fixed inset-0 bg-[var(--on-background)] bg-opacity-70 flex justify-center items-center p-4 hidden z-50">
        <div class="brutal-card max-w-md w-full p-8 relative bg-white">
            <button id="btn-close-modal"
                class="absolute -top-4 -right-4 brutal-border w-11 h-11 flex justify-center items-center text-xl font-black bg-[var(--secondary-container)] brutal-shadow active:translate-y-1 active:translate-x-1 active:shadow-none transition-all">
                X
            </button>
            <h2 class="text-2xl font-black mb-6 uppercase border-b-4 border-[var(--border-color)] pb-2">Agregar
                Ingrediente</h2>
            <form id="form-modal-ingrediente" class="flex flex-col gap-5">
                <div>
                    <label class="block font-bold mb-2 text-lg">Nombre</label>
                    <input type="text" id="modal-input-nombre" class="brutal-input w-full brutal-shadow"
                        placeholder="Ej. Azúcar" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-bold mb-2 text-lg">Precio</label>
                        <input type="number" id="modal-input-precio" inputmode="decimal" class="brutal-input w-full brutal-shadow"
                            step="0.01" placeholder="0.00" required>
                    </div>
                    <div>
                        <label class="block font-bold mb-2 text-lg">Unidad</label>
                        <select id="modal-select-unidad"
                            class="brutal-input w-full brutal-shadow bg-white appearance-none cursor-pointer">
                            <option value="kg">kg</option>
                            <option value="gramos">gramos</option>
                            <option value="litro">litro</option>
                            <option value="ml">ml</option>
                            <option value="unidad">unidad</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="brutal-btn py-3 mt-4 text-xl">Guardar</button>
            </form>
        </div>
    </div>

    <!-- Carga de Lógica de Negocio -->
    <script src="js/app.js"></script>
    <script src="js/ingredientes.js"></script>
    <script src="js/recetas.js"></script>
</body>

</html>
